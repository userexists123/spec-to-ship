openapi: 3.1.0
info:
  title: Spec-to-Ship Gateway
  version: 0.10.2
  description: |
    Action surface for the Spec-to-Ship prototype.

    Supports:
    - PRD parsing
    - backlog preview and execute
    - pull request context and changes
    - acceptance-criteria-grounded review
    - PR summary comment preview and execute
    - release notes and traceability
    - demo mode / fallback validation

servers:
  - url: https://spec-to-ship-production.up.railway.app/api
    description: Railway-hosted gateway

tags:
  - name: Health
  - name: PRD
  - name: Backlog
  - name: Repos
  - name: Traceability

paths:
  /health:
    get:
      tags:
        - Health
      operationId: healthCheck
      summary: Check gateway health
      description: Returns a simple health payload and indicates whether demo mode is active.
      parameters:
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability rows.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Healthy gateway response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /prd/parse:
    post:
      tags:
        - PRD
      operationId: parsePrd
      summary: Parse a PRD into a deterministic backlog bundle
      description: |
        Use this first. The GPT should reason over the PRD text, then call this route
        to obtain the structured backlog bundle that downstream routes can reuse.
      parameters:
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrdParseRequest"
      responses:
        "200":
          description: PRD parsed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrdParseResponse"
        "400":
          description: PRD parsed but validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrdParseResponse"

    get:
      tags:
        - PRD
      operationId: parseDefaultPrd
      summary: Parse the configured default PRD fixture
      parameters:
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Default PRD parsed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrdParseResponse"

  /backlog/execute:
    post:
      tags:
        - Backlog
      operationId: executeBacklog
      summary: Preview or create Azure DevOps work items from a backlog bundle
      description: |
        Default to mode=dry_run. In dry_run this returns the exact Epic and Story payloads
        that would be sent to Azure DevOps. In execute mode, this creates real work items
        using the configured action authentication and approval token setup.
      parameters:
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacklogExecuteRequest"
      responses:
        "200":
          description: Preview or execute result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BacklogExecutePreviewResponse"
                  - $ref: "#/components/schemas/BacklogExecuteSuccessResponse"
        "400":
          description: Backlog validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Execute was attempted without a valid approval token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /repos/pull-requests/{repoId}/{prId}/context:
    get:
      tags:
        - Repos
      operationId: getPullRequestContext
      summary: Get pull request metadata and linked work items
      description: |
        Returns the compact pull request context needed for review reasoning:
        title, description, status, branches, author, linked work items, and
        fallback AB# references parsed from the title and description.
      parameters:
        - name: repoId
          in: path
          required: true
          description: Azure DevOps repository identifier.
          schema:
            type: string
        - name: prId
          in: path
          required: true
          description: Azure DevOps pull request identifier.
          schema:
            type: integer
            minimum: 1
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Pull request context retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestContextRouteResponse"
        "400":
          description: Invalid repoId or prId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /repos/pull-requests/{repoId}/{prId}/changes:
    get:
      tags:
        - Repos
      operationId: getPullRequestChanges
      summary: Get pull request changed files and compact change summaries
      description: |
        Returns a compact summary of changed files for the latest pull request
        iteration. This is intentionally smaller than a raw diff so it remains
        safe for audit logging and easy for downstream review reasoning.
      parameters:
        - name: repoId
          in: path
          required: true
          description: Azure DevOps repository identifier.
          schema:
            type: string
        - name: prId
          in: path
          required: true
          description: Azure DevOps pull request identifier.
          schema:
            type: integer
            minimum: 1
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Pull request changes retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestChangesRouteResponse"
        "400":
          description: Invalid repoId or prId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /repos/pull-requests/{repoId}/{prId}/review:
    get:
      tags:
        - Repos
      operationId: reviewPullRequest
      summary: Generate an acceptance-criteria-grounded review draft
      description: |
        Uses PR context, linked work items, acceptance criteria, and compact
        PR changes to generate a deterministic review draft.
      parameters:
        - name: repoId
          in: path
          required: true
          description: Azure DevOps repository identifier.
          schema:
            type: string
        - name: prId
          in: path
          required: true
          description: Azure DevOps pull request identifier.
          schema:
            type: integer
            minimum: 1
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Pull request review generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestReviewRouteResponse"
        "400":
          description: Invalid repoId or prId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /repos/pull-requests/{repoId}/{prId}/comment:
    post:
      tags:
        - Repos
      operationId: postPullRequestComment
      summary: Preview or post a pull request summary review thread
      description: |
        In dry_run, returns the exact comment body that would be posted.
        In execute mode, posts one summary thread to the selected pull request.
        Duplicate posting is prevented per run_id.
      parameters:
        - name: repoId
          in: path
          required: true
          description: Azure DevOps repository identifier.
          schema:
            type: string
        - name: prId
          in: path
          required: true
          description: Azure DevOps pull request identifier.
          schema:
            type: integer
            minimum: 1
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs, PR comments, and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullRequestCommentRequest"
      responses:
        "200":
          description: Preview or execute result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PullRequestCommentPreviewRouteResponse"
                  - $ref: "#/components/schemas/PullRequestCommentExecuteRouteResponse"
        "400":
          description: Invalid repoId, prId, or request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Execute was attempted without a valid approval token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traceability/{prdId}:
    get:
      tags:
        - Traceability
      operationId: getTraceability
      summary: Return release notes and traceability rows for a PRD
      description: |
        Returns release-note items and requirement-to-release-note traceability rows
        for the chosen PRD and PR. If the linked work item is not present in the
        backlog mapping store, storyId and adoWorkItemId can be supplied to perform
        a manual join for demo purposes.
      parameters:
        - name: prdId
          in: path
          required: true
          description: Stable PRD identifier.
          schema:
            type: string
        - name: repoId
          in: query
          required: true
          description: Azure DevOps repository identifier.
          schema:
            type: string
        - name: prId
          in: query
          required: true
          description: Azure DevOps pull request identifier.
          schema:
            type: integer
            minimum: 1
        - name: threadId
          in: query
          required: false
          description: Optional explicit PR thread id. If omitted, the gateway looks up the thread by run_id.
          schema:
            type: integer
            minimum: 1
        - name: storyId
          in: query
          required: false
          description: Optional manual join story id used when linked work items are not in the mapping store.
          schema:
            type: string
            example: STORY-001
        - name: adoWorkItemId
          in: query
          required: false
          description: Optional manual join Azure DevOps work item id used with storyId.
          schema:
            type: integer
            minimum: 1
            example: 248
        - name: mode
          in: query
          required: false
          description: Defaults to dry_run.
          schema:
            type: string
            enum:
              - dry_run
              - execute
            default: dry_run
        - name: run_id
          in: query
          required: false
          description: Stable identifier used for audit logs and traceability.
          schema:
            type: string
            example: demo-20260426-s10
      responses:
        "200":
          description: Traceability returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceabilityRouteResponse"
        "400":
          description: Invalid request or no traceability rows found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - environment
        - demoMode
        - liveApisEnabled
        - message
      properties:
        status:
          type: string
          example: ok
        environment:
          type: string
          example: production
        demoMode:
          type: boolean
          example: false
        liveApisEnabled:
          type: boolean
          example: true
        message:
          type: string
          example: Spec-to-Ship gateway is running

    SourceReference:
      type: object
      required:
        - section
        - excerpt
      properties:
        section:
          type: string
        excerpt:
          type: string

    Requirement:
      type: object
      required:
        - id
        - title
        - summary
        - priority
        - source_refs
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        priority:
          type: string
          enum:
            - high
            - medium
            - low
        source_refs:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"

    Epic:
      type: object
      required:
        - id
        - title
        - summary
        - requirement_ids
        - source_refs
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        requirement_ids:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"

    AcceptanceCriterion:
      type: object
      required:
        - id
        - story_id
        - text
      properties:
        id:
          type: string
        story_id:
          type: string
        text:
          type: string

    Story:
      type: object
      required:
        - id
        - epic_id
        - title
        - summary
        - requirement_ids
        - acceptance_criteria
        - source_refs
      properties:
        id:
          type: string
        epic_id:
          type: string
        title:
          type: string
        summary:
          type: string
        requirement_ids:
          type: array
          items:
            type: string
        acceptance_criteria:
          type: array
          items:
            $ref: "#/components/schemas/AcceptanceCriterion"
        source_refs:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"

    Risk:
      type: object
      required:
        - id
        - title
        - severity
        - related_requirement_ids
        - mitigation_note
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          type: string
          enum:
            - high
            - medium
            - low
        related_requirement_ids:
          type: array
          items:
            type: string
        mitigation_note:
          type: string

    BacklogBundle:
      type: object
      required:
        - prd_id
        - title
        - requirements
        - epics
        - stories
        - risks
      properties:
        prd_id:
          type: string
        title:
          type: string
        requirements:
          type: array
          items:
            $ref: "#/components/schemas/Requirement"
        epics:
          type: array
          items:
            $ref: "#/components/schemas/Epic"
        stories:
          type: array
          items:
            $ref: "#/components/schemas/Story"
        risks:
          type: array
          items:
            $ref: "#/components/schemas/Risk"

    ValidationResult:
      type: object
      required:
        - ok
        - errors
      properties:
        ok:
          type: boolean
        errors:
          type: array
          items:
            type: string

    PrdParseRequest:
      type: object
      additionalProperties: false
      properties:
        prdId:
          type: string
        prdText:
          type: string

    PrdParseResponse:
      type: object
      required:
        - ok
        - prd_id
        - backlog
        - validation
      properties:
        ok:
          type: boolean
        prd_id:
          type: string
        backlog:
          $ref: "#/components/schemas/BacklogBundle"
        validation:
          $ref: "#/components/schemas/ValidationResult"

    BacklogExecuteRequest:
      type: object
      additionalProperties: true
      properties:
        prdId:
          type: string
        backlog:
          $ref: "#/components/schemas/BacklogBundle"

    WorkItemPayload:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        parentId:
          type: integer

    BacklogPreviewEpic:
      type: object
      required:
        - local_id
        - work_item_type
        - payload
      properties:
        local_id:
          type: string
        work_item_type:
          type: string
        payload:
          $ref: "#/components/schemas/WorkItemPayload"

    BacklogPreviewStory:
      type: object
      required:
        - local_id
        - parent_local_id
        - work_item_type
        - payload
      properties:
        local_id:
          type: string
        parent_local_id:
          type: string
        work_item_type:
          type: string
        payload:
          $ref: "#/components/schemas/WorkItemPayload"

    BacklogExecutePreviewResponse:
      type: object
      required:
        - ok
        - mode
        - outcome
        - action
        - preview
      properties:
        ok:
          type: boolean
          const: true
        mode:
          type: string
          const: dry_run
        outcome:
          type: string
          const: preview
        action:
          type: string
          const: backlog_execute
        preview:
          type: object
          required:
            - project
            - prd_id
            - backlog_title
            - epic_count
            - story_count
            - epics
            - stories
          properties:
            project:
              type: string
            prd_id:
              type: string
            backlog_title:
              type: string
            epic_count:
              type: integer
            story_count:
              type: integer
            epics:
              type: array
              items:
                $ref: "#/components/schemas/BacklogPreviewEpic"
            stories:
              type: array
              items:
                $ref: "#/components/schemas/BacklogPreviewStory"

    BacklogMappingRecord:
      type: object
      required:
        - run_id
        - local_id
        - work_item_type
        - ado_work_item_id
        - ado_url
      properties:
        run_id:
          type: string
        local_id:
          type: string
        work_item_type:
          type: string
        ado_work_item_id:
          type: integer
        ado_url:
          type: string
        parent_local_id:
          type: string
        requirement_ids:
          type: array
          items:
            type: string

    BacklogExecuteSuccessResponse:
      type: object
      required:
        - ok
        - mode
        - outcome
        - action
        - result
      properties:
        ok:
          type: boolean
          const: true
        mode:
          type: string
          const: execute
        outcome:
          type: string
          const: success
        action:
          type: string
          const: backlog_execute
        result:
          type: object
          required:
            - project
            - prd_id
            - backlog_title
            - epic_count
            - story_count
            - created_items
            - mapping_path
          properties:
            project:
              type: string
            prd_id:
              type: string
            backlog_title:
              type: string
            epic_count:
              type: integer
            story_count:
              type: integer
            created_items:
              type: array
              items:
                $ref: "#/components/schemas/BacklogMappingRecord"
            mapping_path:
              type: string

    PullRequestLinkedWorkItem:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        url:
          type: string
        title:
          type: string

    PullRequestAuthor:
      type: object
      properties:
        displayName:
          type: string
        uniqueName:
          type: string

    PullRequestContextResponse:
      type: object
      required:
        - repoId
        - prId
        - title
        - description
        - status
        - workItems
        - abReferences
      properties:
        repoId:
          type: string
        prId:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
        sourceRefName:
          type: string
        targetRefName:
          type: string
        createdBy:
          $ref: "#/components/schemas/PullRequestAuthor"
        workItems:
          type: array
          items:
            $ref: "#/components/schemas/PullRequestLinkedWorkItem"
        abReferences:
          type: array
          items:
            type: integer

    PullRequestContextRouteResponse:
      type: object
      required:
        - ok
        - mode
        - outcome
        - action
        - result
      properties:
        ok:
          type: boolean
          const: true
        mode:
          type: string
          enum:
            - dry_run
            - execute
        outcome:
          type: string
          const: success
        action:
          type: string
          const: pr_context
        result:
          $ref: "#/components/schemas/PullRequestContextResponse"

    PullRequestFileChangeSummary:
      type: object
      required:
        - path
        - changeType
        - summary
      properties:
        path:
          type: string
        changeType:
          type: string
        additions:
          type: integer
        deletions:
          type: integer
        isBinary:
          type: boolean
        summary:
          type: string

    PullRequestChangesResponse:
      type: object
      required:
        - repoId
        - prId
        - fileCount
        - returnedFileCount
        - truncated
        - files
      properties:
        repoId:
          type: string
        prId:
          type: integer
        iterationId:
          type: integer
        fileCount:
          type: integer
        returnedFileCount:
          type: integer
        truncated:
          type: boolean
        files:
          type: array
          items:
            $ref: "#/components/schemas/PullRequestFileChangeSummary"

    PullRequestChangesRouteResponse:
      type: object
      required:
        - ok
        - mode
        - outcome
        - action
        - result
      properties:
        ok:
          type: boolean
          const: true
        mode:
          type: string
          enum:
            - dry_run
            - execute
        outcome:
          type: string
          const: success
        action:
          type: string
          const: pr_changes
        result:
          $ref: "#/components/schemas/PullRequestChangesResponse"

    ReviewFinding:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          enum:
            - strength
            - gap
            - scope_creep
            - follow_up
        message:
          type: string

    ReviewCriterionAssessment:
      type: object
      required:
        - criterionId
        - workItemId
        - workItemTitle
        - requirementIds
        - criterion
        - status
        - evidence
        - note
      properties:
        criterionId:
          type: string
        workItemId:
          type: integer
        workItemTitle:
          type: string
        requirementIds:
          type: array
          items:
            type: string
        criterion:
          type: string
        status:
          type: string
          enum:
            - met
            - partial
            - not_evident
        evidence:
          type: array
          items:
            type: string
        note:
          type: string

    PullRequestReviewDraft:
      type: object
      required:
        - repoId
        - prId
        - summary
        - linkedWorkItemIds
        - requirementIds
        - checklist
        - findings
        - possibleScopeCreep
        - followUps
      properties:
        repoId:
          type: string
        prId:
          type: integer
        summary:
          type: string
        linkedWorkItemIds:
          type: array
          items:
            type: integer
        requirementIds:
          type: array
          items:
            type: string
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/ReviewCriterionAssessment"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/ReviewFinding"
        possibleScopeCreep:
          type: array
          items:
            type: string
        followUps:
          type: array
          items:
            type: string

    PullRequestReviewRouteResponse:
      type: object
      required:
        - ok
        - mode
